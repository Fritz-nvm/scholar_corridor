{% extends 'base.html' %}

{% block title %}Password Updated | Scholar Corridor{% endblock %}

{% block content %}
<div class="py-12 md:py-20">
    <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
        <svg class="w-12 h-12 mx-auto mb-4 text-gold-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg>
        <h1 class="font-serif text-3xl font-bold text-navy-900">Password Updated</h1>
        <p class="mt-3 text-navy-600">Your password has been changed successfully. You can sign in with the new password now.</p>
        <div class="mt-6">
            <a href="{% url 'login' %}" class="inline-flex items-center justify-center px-5 py-2.5 bg-navy-800 text-white font-semibold text-sm rounded hover:bg-navy-700 transition-colors">Go to Sign In</a>
        </div>
    </div>
</div>
{% endblock %}
